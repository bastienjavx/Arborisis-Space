# Configuration Railway d'Arborisis — service API (service par défaut du dépôt).
#
# Architecture sur Railway (un seul projet) :
#   1. PostgreSQL   (plugin Railway)
#   2. Redis        (plugin Railway)
#   3. api          (ce dépôt, docker/api.Dockerfile) ← CE fichier
#   4. web          (ce dépôt, docker/web.Dockerfile) ← railway.web.toml
#   5. univers-N    (nodes API auto-provisionnés à saturation, dupliqués depuis « api »)
#
# Variables à définir sur le service API :
#   DATABASE_URL          → référence du plugin PostgreSQL
#   REDIS_URL             → référence du plugin Redis
#   JWT_ACCESS_SECRET     → openssl rand -base64 48   (PARTAGÉ par tous les nodes)
#   JWT_REFRESH_SECRET    → openssl rand -base64 48   (PARTAGÉ par tous les nodes)
#   WEB_ORIGIN            → URL publique du service web
#   NODE_ENV=production
#
# Auto-scaling (création d'un node par univers à saturation) :
#   UNIVERSE_PROVISIONING_ENABLED=true
#   RAILWAY_API_TOKEN, RAILWAY_PROJECT_ID, RAILWAY_SERVICE_TEMPLATE_ID(=id du service « api »)
#   RAILWAY_ENVIRONMENT_ID (optionnel), UNIVERSE_MAX_PLAYERS (def. 500)
#   UNIVERSE_PROVISION_THRESHOLD (def. 0.9), UNIVERSE_PROVISION_REPLICAS (def. 2)
#
# IMPORTANT : les nodes provisionnés sont dupliqués depuis le service « api ». Ils
# héritent donc de ce fichier, Y COMPRIS le `preDeployCommand`. Comme ils partagent la
# même base, migrate+seed y sont des no-op idempotents (migrate = aucune migration en
# attente, seed = upserts). Aucune action requise.

[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/api.Dockerfile"

[deploy]
# Release phase : migrations + seed une seule fois par déploiement, dans un conteneur
# dédié, AVANT la mise en service des réplicas (plus de course entre instances).
preDeployCommand = ["npx prisma migrate deploy && npx prisma db seed"]
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[deploy.multiRegionConfig.us-west2]
numReplicas = 3

[deploy.multiRegionConfig.us-east4-eqdc4a]
numReplicas = 5

[deploy.multiRegionConfig.europe-west4-drams3a]
numReplicas = 5

[deploy.multiRegionConfig.asia-southeast1-eqsg3a]
numReplicas = 3

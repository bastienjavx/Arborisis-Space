# Configuration Railway du worker de provisioning des univers.
#
# Service Railway cible : worker-provisioning
# Config-as-code path : /railway.worker.provisioning.toml
#
# Variables requises en plus des variables communes :
#   RAILWAY_API_TOKEN
#   RAILWAY_PROJECT_ID
#   RAILWAY_SERVICE_TEMPLATE_ID
#   RAILWAY_ENVIRONMENT_ID
#   UNIVERSE_PROVISIONING_ENABLED=true
#   UNIVERSE_MAX_PLAYERS, UNIVERSE_PROVISION_THRESHOLD, UNIVERSE_PROVISION_REPLICAS

[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/api.Dockerfile"
watchPatterns = [
  "apps/api/**",
  "packages/shared/**",
  "prisma/**",
  "docker/api.Dockerfile",
  "railway.worker.provisioning.toml",
  "package.json",
  "package-lock.json",
  "turbo.json",
]

[deploy]
startCommand = "SERVICE_ROLE=worker WORKER_ROLE=provisioning node apps/api/dist/worker.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[deploy.multiRegionConfig.europe-west4-drams3a]
numReplicas = 1

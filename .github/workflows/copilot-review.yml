name: AI Code Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

concurrency:
  group: code-review-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: read

jobs:
  code-review:
    name: AI-Powered Code Review
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run CodeRabbit Review
        uses: coderabbitai/github-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

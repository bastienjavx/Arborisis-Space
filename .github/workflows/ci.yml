name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: arborisis
          POSTGRES_PASSWORD: arborisis
          POSTGRES_DB: arborisis_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U arborisis -d arborisis_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://arborisis:arborisis@localhost:5432/arborisis_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret-0123456789-abcdefghijklmnop
      JWT_REFRESH_SECRET: ci-refresh-secret-0123456789-abcdefghijklmnop

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Build (turbo)
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Formatting
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: E2E tests (API)
        run: npm run test:e2e -w @arborisis/api

name: Security

# Scan de secrets (gitleaks) + audit des dépendances runtime (npm audit).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 5 * * 1" # lundi 05:23 UTC

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Scan de secrets (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GITLEAKS_VERSION: "8.21.2"
    steps:
      - uses: actions/checkout@v7
        with:
          # Historique complet : gitleaks scanne aussi les commits passés sur les PR.
          fetch-depth: 0
      # Binaire épinglé plutôt que l'action : pas d'appel API GitHub (évite le 403
      # « Resource not accessible by integration ») ni de dépendance à une licence.
      - name: Installer gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan
        run: gitleaks detect --source . --redact --verbose --exit-code 1

  dependency-audit:
    name: Audit dépendances runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      # Bloquant : toute faille CRITIQUE ou HIGH des dépendances livrées arrête le
      # pipeline (--omit=dev : les outils de build ne sont pas dans l'image de prod).
      # Les high transitives connues sont remédiées (override multer, bump
      # @nestjs/config) ; toute nouvelle régression high doit passer par un bump /
      # override explicite, suivi par Dependabot (groupe security).
      - name: npm audit (critique + high = bloquant)
        run: npm audit --audit-level=high --omit=dev
      # Informatif : les failles moderate restantes (pile NestJS 10 → 11, next/postcss…)
      # sont remontées sans bloquer ; remédiation via bump majeur dédié.
      - name: npm audit (moderate informatif)
        if: always()
        continue-on-error: true
        run: npm audit --audit-level=moderate --omit=dev

name: Security

# Scan de secrets (gitleaks) + audit des dépendances runtime (npm audit).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 5 * * 1' # lundi 05:23 UTC

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Scan de secrets (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      GITLEAKS_VERSION: '8.21.2'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Historique complet : gitleaks scanne aussi les commits passés sur les PR.
          fetch-depth: 0
          persist-credentials: false
      # Binaire épinglé plutôt que l'action : pas d'appel API GitHub (évite le 403
      # « Resource not accessible by integration ») ni de dépendance à une licence.
      - name: Installer gitleaks
        run: |
          asset="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          base_url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          curl -sSfLo "/tmp/${asset}" "${base_url}/${asset}"
          curl -sSfLo /tmp/gitleaks_checksums.txt "${base_url}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          grep " ${asset}\$" /tmp/gitleaks_checksums.txt | (cd /tmp && sha256sum -c -)
          tar -xzf "/tmp/${asset}" -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan
        run: >-
          gitleaks detect --source . --redact --verbose --exit-code 1
          --report-format sarif --report-path gitleaks.sarif
      - name: Upload SARIF (gitleaks)
        if: always()
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

  dependency-audit:
    name: Audit dépendances runtime
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
      # Bloquant : toute faille CRITIQUE ou HIGH des dépendances livrées arrête le
      # pipeline (--omit=dev : les outils de build ne sont pas dans l'image de prod).
      # Les high transitives connues sont remédiées (override multer, bump
      # @nestjs/config) ; toute nouvelle régression high doit passer par un bump /
      # override explicite, suivi par Dependabot (groupe security).
      - name: npm audit (critique + high = bloquant)
        run: npm audit --audit-level=high --omit=dev
      # Informatif : les failles moderate restantes (pile NestJS 10 → 11, next/postcss…)
      # sont remontées sans bloquer ; remédiation via bump majeur dédié.
      - name: npm audit (moderate informatif)
        if: always()
        continue-on-error: true
        run: npm audit --audit-level=moderate --omit=dev

  trivy-repo-scan:
    name: Scan Trivy (repo/config)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Trivy scan (HIGH + CRITICAL bloquant)
        # v0.35.0 is the first safe tag after the March 2026 tag compromise.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          limit-severities-for-sarif: true
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif
          exit-code: '1'
      - name: Upload SARIF (trivy)
        if: always()
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357
        with:
          sarif_file: trivy-results.sarif
          category: trivy

name: Security

# Scan de secrets (gitleaks) + audit des dépendances runtime (npm audit).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 5 * * 1" # lundi 05:23 UTC

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Scan de secrets (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Historique complet : gitleaks scanne aussi les commits passés sur les PR.
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    name: Audit dépendances runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Échoue uniquement sur les failles haute/critique des dépendances livrées
      # (--omit=dev : les outils de build ne sont pas dans l'image de prod).
      - name: npm audit (prod, high+)
        run: npm audit --audit-level=high --omit=dev

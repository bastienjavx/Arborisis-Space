name: CodeQL

# Analyse statique de sécurité (SAST) sur le code JS/TS du monorepo.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Re-scan hebdomadaire pour attraper les nouvelles règles/CVE (lundi 04:17 UTC).
    - cron: "17 4 * * 1"

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyse CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript"]

    steps:
      - uses: actions/checkout@v4

      - name: Initialiser CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Analyse
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

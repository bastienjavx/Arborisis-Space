name: OSSF Scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: '41 4 * * 1' # lundi 04:41 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scorecards-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scorecard-analysis:
    name: Scorecard supply-chain
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Run OSSF Scorecard
        uses: ossf/scorecard-action@dc50aa9510b46c811795eb24b2f1ba02a914e534
        with:
          results_file: scorecard-results.sarif
          results_format: sarif

      - name: Upload SARIF (scorecard)
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357
        with:
          sarif_file: scorecard-results.sarif
          category: scorecard

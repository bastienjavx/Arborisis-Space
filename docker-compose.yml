# Stack locale Arborisis.
#
# Développement courant :
#   docker compose up -d postgres redis      # données seulement
#   npm run dev                              # api + web en local (hot reload)
#
# Stack complète conteneurisée :
#   docker compose up --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: arborisis
      POSTGRES_PASSWORD: arborisis
      POSTGRES_DB: arborisis
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U arborisis -d arborisis']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: postgresql://arborisis:arborisis@postgres:5432/arborisis?schema=public
      REDIS_URL: redis://redis:6379
      WEB_ORIGIN: http://localhost:3000
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-0123456789-abcdefghijklmnop}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-0123456789-abcdefghijklmnop}
    ports:
      - '4000:4000'

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      API_INTERNAL_URL: http://api:4000
    ports:
      - '3000:3000'

volumes:
  postgres-data:
  redis-data:
